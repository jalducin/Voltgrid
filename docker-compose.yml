# docker-compose.yml — raíz del proyecto S2G Energy Dashboard
services:

  backend:
    build:
      context: ./backend-s2g
      dockerfile: Dockerfile
    container_name: s2g-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend-s2g/.env
    volumes:
      - ./backend-s2g:/app       # live reload en desarrollo
      - s2g_db:/app/s2g.db       # persiste el archivo SQLite
    restart: always

  frontend:
    build:
      context: ./frontend-s2g
      dockerfile: Dockerfile
    container_name: s2g-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: always

volumes:
  s2g_db:
