# Autoescalado de la API por CPU. scaleDown estabilizado a 300s para no cortar
# conexiones WebSocket de larga duración durante picos transitorios.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voltgrid-api
  labels:
    app.kubernetes.io/name: voltgrid-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voltgrid-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
