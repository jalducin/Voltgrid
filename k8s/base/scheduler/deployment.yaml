# Deployment del scheduler (APScheduler en proceso).
#   * replicas: 1 SIEMPRE. APScheduler corre en proceso; con >1 réplica se
#     dispararían los jobs por duplicado. NO se le pone HPA.
#   * SCHEDULER_ENABLED=true (la API corre con false).
#   * No expone puerto HTTP; liveness por presencia del proceso.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voltgrid-scheduler
  labels:
    app.kubernetes.io/name: voltgrid-scheduler
spec:
  replicas: 1
  strategy:
    # Evita dos schedulers vivos a la vez durante un rollout.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: voltgrid-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voltgrid-scheduler
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scheduler
          image: voltgrid-api:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: voltgrid-config
            - secretRef:
                name: voltgrid-secret
          env:
            - name: SCHEDULER_ENABLED
              value: "true"
            - name: RUN_MIGRATIONS
              value: "false"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
      volumes:
        - name: tmp
          emptyDir: {}
