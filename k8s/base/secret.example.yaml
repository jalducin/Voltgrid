# =============================================================================
# PLANTILLA de Secret. NO aplicar tal cual en producción: los valores aquí son
# PLACEHOLDERS. Gestiona los secretos reales con SealedSecrets, SOPS o External
# Secrets Operator (ESO). Este archivo solo documenta las claves esperadas.
#
# Roles de base de datos (recordatorio RLS):
#   * DATABASE_URL / SYNC_DATABASE_URL  -> rol voltgrid_app (NO superusuario).
#       Lo usan api y scheduler en runtime; RLS aplica para el aislamiento tenant.
#   * MIGRATIONS_DATABASE_URL           -> rol ADMIN (dueño de tablas).
#       Lo usa el Job de migraciones (alembic upgrade head) en cada release.
#       Se mapea a DATABASE_URL dentro del Job (Alembic lee DATABASE_URL).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: voltgrid-secret
type: Opaque
stringData:
  # Postgres (rol admin). Solo relevante si usas el StatefulSet en cluster.
  POSTGRES_PASSWORD: "CHANGE_ME_admin_password"

  # Runtime de la app (rol NO superusuario voltgrid_app).
  DATABASE_URL: "postgresql+asyncpg://voltgrid_app:CHANGE_ME@voltgrid-postgres:5432/voltgrid"
  SYNC_DATABASE_URL: "postgresql+psycopg://voltgrid_app:CHANGE_ME@voltgrid-postgres:5432/voltgrid"

  # Migraciones (rol admin, dueño de tablas). Solo lo consume el Job de migración.
  MIGRATIONS_DATABASE_URL: "postgresql+asyncpg://voltgrid:CHANGE_ME_admin_password@voltgrid-postgres:5432/voltgrid"

  # JWT / sesión.
  JWT_SECRET: "CHANGE_ME_clave_larga_aleatoria"
  SESSION_SECRET_KEY: "CHANGE_ME_otra_clave"

  # OAuth.
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""
