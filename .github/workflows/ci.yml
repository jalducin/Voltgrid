# CI de VoltGrid: lint+tests de backend (con Postgres real para RLS),
# build del frontend, y build de imágenes Docker (solo en push a main).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Backend: ruff + pytest contra un Postgres real (RLS necesita BD de verdad).
  # ---------------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voltgrid
          POSTGRES_PASSWORD: voltgrid
          POSTGRES_DB: voltgrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voltgrid -d voltgrid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # La app corre como rol NO superusuario (voltgrid_app). El conftest crea ese
      # rol usando ADMIN_DATABASE_URL (el superusuario del servicio postgres).
      DATABASE_URL: postgresql+asyncpg://voltgrid_app:voltgrid_app@localhost:5432/voltgrid
      SYNC_DATABASE_URL: postgresql+psycopg://voltgrid_app:voltgrid_app@localhost:5432/voltgrid
      ADMIN_DATABASE_URL: postgresql+asyncpg://voltgrid:voltgrid@localhost:5432/voltgrid
      SCHEDULER_ENABLED: "false"
    defaults:
      run:
        working-directory: voltgrid-api
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: voltgrid-api/requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest

  # ---------------------------------------------------------------------------
  # Frontend: npm ci + lint (si existe) + build con URL de API dummy.
  # ---------------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voltgrid-web
    env:
      # NEXT_PUBLIC_API_URL se hornea en build; en CI usamos un valor dummy.
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: voltgrid-web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (si está definido)
        run: |
          if npm run | grep -q "^  lint"; then
            npm run lint
          else
            echo "No hay script 'lint'; se omite."
          fi

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Build de imágenes Docker. Solo en push a main. No hace push (gated).
  # ---------------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen API
        uses: docker/build-push-action@v6
        with:
          context: ./voltgrid-api
          push: false
          tags: voltgrid-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build imagen Web
        uses: docker/build-push-action@v6
        with:
          context: ./voltgrid-web
          push: false
          tags: voltgrid-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
